<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Portfolio</title>
  <link rel="icon" type="image/png" href="/static/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#0f0f1a;color:#e8e8f5;min-height:100vh;
         display:flex;align-items:center;justify-content:center;
         background-image:radial-gradient(ellipse at 20% 50%,rgba(108,99,255,.12) 0,transparent 55%),
                          radial-gradient(ellipse at 80% 20%,rgba(255,101,132,.1) 0,transparent 50%)}
    .orb{position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none}
    .orb-1{width:400px;height:400px;background:rgba(108,99,255,.08);top:-120px;left:-80px}
    .orb-2{width:300px;height:300px;background:rgba(255,101,132,.07);bottom:-80px;right:-60px}
    .login-box{
      background:rgba(26,26,46,.9);
      border:1px solid rgba(108,99,255,.2);
      border-radius:24px;padding:2.5rem;width:100%;max-width:420px;
      backdrop-filter:blur(20px);
      box-shadow:0 20px 60px rgba(0,0,0,.5);
      position:relative;z-index:1;
    }
    .login-logo{text-align:center;margin-bottom:2rem}
    .login-logo .emoji{font-size:3rem;display:block;margin-bottom:.75rem}
    .login-logo h1{font-size:1.5rem;font-weight:800;
      background:linear-gradient(135deg,#6c63ff,#ff6584);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .login-logo p{font-size:.85rem;color:#a0a0c8;margin-top:.25rem}
    .form-group{margin-bottom:1.1rem}
    .form-group label{display:block;font-size:.8rem;font-weight:600;color:#a0a0c8;margin-bottom:.4rem}
    .form-group input{
      width:100%;padding:.75rem 1rem;
      background:rgba(255,255,255,.05);
      border:1.5px solid rgba(108,99,255,.2);
      border-radius:10px;color:#e8e8f5;
      font-family:inherit;font-size:.95rem;outline:none;
      transition:border-color .2s;
    }
    .form-group input:focus{border-color:#6c63ff}
    .btn-login{
      width:100%;padding:.8rem;
      background:linear-gradient(135deg,#6c63ff,#ff6584);
      color:white;border:none;border-radius:10px;
      font-family:inherit;font-size:1rem;font-weight:700;
      cursor:pointer;transition:opacity .2s,transform .2s;
      margin-top:.5rem;
    }
    .btn-login:hover{opacity:.9;transform:translateY(-1px)}
    .error-msg{
      background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);
      color:#ef4444;border-radius:8px;padding:.7rem 1rem;
      font-size:.85rem;margin-bottom:1rem;
    }
    .login-hint{
      text-align:center;margin-top:1.5rem;
      background:rgba(108,99,255,.08);border:1px solid rgba(108,99,255,.15);
      border-radius:8px;padding:.75rem;
      font-size:.78rem;color:#a0a0c8;
    }
    .login-hint code{color:#6c63ff;background:rgba(108,99,255,.15);padding:.1rem .4rem;border-radius:4px}
    .back-link{display:block;text-align:center;margin-top:1rem;color:#a0a0c8;font-size:.82rem}
    .back-link:hover{color:#6c63ff}
  </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="login-box">
  <div class="login-logo">
    <span class="emoji">🔐</span>
    <h1>Admin Login</h1>
    <p>Portfolio Dashboard</p>
  </div>

  {% if error %}
  <div class="error-msg">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST" action="/admin/login">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="admin" required autocomplete="username" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
    </div>
    <button type="submit" class="btn-login">Login →</button>
  </form>

  <div class="login-hint">
    Default credentials: <code>admin</code> / <code>admin123</code><br>
    Change your password after first login.
  </div>
  <a href="/" class="back-link">← Back to Portfolio</a>
</div>
</body>
</html>
